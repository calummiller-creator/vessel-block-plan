<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asset Summary</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f6f5f1;--surface:#ffffff;--border:#e2e0d8;--border-light:#eeece6;--text:#1a1a18;--text-sec:#6b6a65;--text-tri:#9c9b95;--accent:#2d6cb4;--accent-light:#e8f0fa;--font:'DM Sans',-apple-system,sans-serif;--mono:'JetBrains Mono',monospace;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{margin:0;padding:0;overflow:hidden;height:100%;}
body{font-family:var(--font);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;}
.app{height:100%;display:flex;flex-direction:column;}

.toolbar{display:flex;align-items:center;gap:8px;padding:8px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
.toolbar-title{font-size:14px;font-weight:700;letter-spacing:-0.2px;}
.toolbar-context{font-size:10px;color:var(--text-tri);margin-right:auto;}
.chip{font-family:var(--font);font-size:10px;font-weight:500;padding:4px 10px;border-radius:4px;border:1px solid var(--border);background:var(--surface);color:var(--text-sec);cursor:pointer;}
.chip:hover{border-color:#bbb;}

/* Asset selector */
.selector{padding:8px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.selector-label{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;color:var(--text-tri);}
.asset-chip{font-family:var(--font);font-size:10px;font-weight:500;padding:4px 12px;border-radius:4px;border:1px solid var(--border);background:var(--surface);color:var(--text-sec);cursor:pointer;}
.asset-chip:hover{border-color:#bbb;}
.asset-chip.selected{background:var(--accent);color:#fff;border-color:var(--accent);}

.content{flex:1;overflow-y:auto;padding:16px;}
.no-selection{text-align:center;padding:60px;color:var(--text-tri);font-size:12px;}

/* Asset header */
.asset-header{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px 20px;margin-bottom:14px;}
.asset-name{font-size:20px;font-weight:700;letter-spacing:-0.3px;}
.asset-sub{font-size:12px;color:var(--text-sec);margin-top:2px;}
.asset-stats{display:flex;gap:16px;margin-top:12px;flex-wrap:wrap;}
.as{background:var(--bg);border-radius:6px;padding:10px 14px;min-width:100px;}
.as-val{font-size:20px;font-weight:700;}
.as-lbl{font-size:8px;color:var(--text-tri);text-transform:uppercase;letter-spacing:0.3px;margin-top:1px;}

/* Timeline section */
.section{background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:14px;overflow:hidden;}
.section-hdr{padding:12px 16px;border-bottom:1px solid var(--border-light);font-size:13px;font-weight:600;}

/* Gantt */
.gantt-wrap{padding:0 16px 12px;}
.gantt-timeline{position:relative;margin-left:200px;}
.gantt-months{position:relative;height:22px;background:#f0efeb;border-bottom:1px solid var(--border);}
.gantt-mo{position:absolute;top:0;height:100%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:var(--text);border-right:1px solid var(--border);}
.gantt-wks{position:relative;height:14px;border-bottom:1px solid var(--border-light);}
.gantt-wk{position:absolute;font-size:7px;color:var(--text-tri);font-family:var(--mono);text-align:center;line-height:14px;}
.gantt-rows{position:relative;}
.gantt-gridline{position:absolute;top:0;bottom:0;width:1px;background:var(--border);opacity:0.2;pointer-events:none;}

.gantt-row{display:flex;align-items:center;min-height:26px;border-bottom:1px solid var(--border-light);}
.gantt-row:last-child{border-bottom:none;}
.gantt-label{width:200px;min-width:200px;padding:4px 8px 4px 16px;}
.gantt-label-title{font-size:10px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.gantt-label-sub{font-size:8px;color:var(--text-tri);display:flex;gap:4px;align-items:center;}
.gantt-track{flex:1;position:relative;height:18px;}
.gantt-bar{position:absolute;height:14px;top:2px;border-radius:3px;display:flex;align-items:center;padding:0 4px;font-size:7px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;cursor:pointer;}
.gantt-bar *{pointer-events:none;}
.gantt-bar:hover{filter:brightness(1.1);}
.gantt-window{position:absolute;height:14px;top:2px;border-radius:3px;border:1.5px dashed;opacity:0.2;}
.bar-port{background-image:repeating-linear-gradient(45deg,transparent,transparent 2px,rgba(255,255,255,0.25) 2px,rgba(255,255,255,0.25) 4px);}
.bar-transit{opacity:0.6;}
.bar-contingency{border:1px dashed rgba(255,255,255,0.4);opacity:0.7;}

/* Vessel utilisation */
.vessel-row{display:flex;align-items:center;min-height:24px;padding:4px 16px;border-bottom:1px solid var(--border-light);}
.vessel-row:last-child{border-bottom:none;}
.vessel-name{width:160px;font-size:10px;font-weight:500;}
.vessel-bar-track{flex:1;position:relative;height:12px;background:#f4f3ef;border-radius:2px;margin-left:8px;}
.vessel-bar{position:absolute;height:100%;border-radius:2px;opacity:0.8;}

/* Campaign summary table */
.camp-table{width:100%;border-collapse:collapse;font-size:10px;}
.camp-table th{padding:6px 10px;text-align:left;font-size:8px;font-weight:600;color:var(--text-tri);text-transform:uppercase;letter-spacing:0.3px;background:#fafaf7;border-bottom:1px solid var(--border);}
.camp-table td{padding:5px 10px;border-bottom:1px solid var(--border-light);}
.camp-table tr:hover{background:rgba(45,108,180,0.02);}
.grp-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:3px;}

/* SubType badges */
.st-badge{font-size:6px;font-weight:700;padding:1px 4px;border-radius:2px;letter-spacing:0.3px;text-transform:uppercase;}
.st-work{background:#e4f5ee;color:#1a8c68;}
.st-port{background:#f0efeb;color:#5c5b56;}
.st-transit{background:#e8f0fa;color:#2d6cb4;}
.st-contingency{background:#fef3cd;color:#856404;}

/* Popup */
.popup{position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:8px;box-shadow:0 8px 30px rgba(0,0,0,0.12);padding:14px 16px;z-index:100;min-width:260px;max-width:340px;font-size:11px;opacity:0;pointer-events:none;transition:opacity 0.12s;}
.popup.open{opacity:1;pointer-events:auto;}
.popup-title{font-size:13px;font-weight:700;margin-bottom:8px;padding-right:20px;}
.popup-close{position:absolute;top:8px;right:8px;width:22px;height:22px;border-radius:4px;border:1px solid var(--border);background:var(--surface);color:var(--text-sec);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;}
.popup-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--border-light);}
.popup-row:last-child{border-bottom:none;}
.popup-lbl{color:var(--text-tri);font-size:10px;}
.popup-val{font-weight:500;text-align:right;max-width:180px;}

@media print{.toolbar,.selector{display:none;}.content{overflow:visible;padding:0;}}
</style>
</head>
<body>
<div class="app">
  <div class="toolbar">
    <div class="toolbar-title">Asset Summary</div>
    <div class="toolbar-context" id="toolbarContext"></div>
    <button class="chip" onclick="toggleHelp()" style="font-size:11px;">?</button>
  </div>
  <div class="selector" id="selector">
    <span class="selector-label">Asset:</span>
    <div id="assetChips" style="display:flex;gap:4px;flex-wrap:wrap;"></div>
  </div>
  <div class="content" id="content">
    <div class="no-selection">Select an asset above to view its activity summary.</div>
  </div>
</div>

<div class="popup" id="popup">
  <button class="popup-close" onclick="closePopup()">&times;</button>
  <div id="popupContent"></div>
</div>

<script>
var SCOPE_COLORS={'Drilling':'#c45222','Well STIM/LWI':'#1a8c68','W2W':'#2196a3','IRM':'#2d6cb4','Construction':'#7c5cbf','DSV':'#b83f6b','Survey':'#607d8b','Platform':'#7a7972','Logistics':'#b8860b','Seismic Survey':'#5c6bc0'};
var MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function escHtml(s){if(!s)return'';if(typeof s==='object')s=s.Value||s.Title||'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtDate(d){if(!d||typeof d==='object')return'';var dt=new Date(d);if(isNaN(dt.getTime()))return'';return dt.getDate()+' '+MONTHS[dt.getMonth()]+' '+dt.getFullYear();}
function daysBetween(a,b){if(!a||!b)return 0;return Math.round((new Date(b)-new Date(a))/86400000);}
function getColor(g){return SCOPE_COLORS[g]||'#888';}
function getBarClass(st){var s=(st||'').toLowerCase();if(s==='port')return' bar-port';if(s==='transit')return' bar-transit';if(s==='contingency')return' bar-contingency';return'';}
function getStBadge(st){var s=(st||'').toLowerCase();var cls={work:'st-work',port:'st-port',transit:'st-transit',contingency:'st-contingency'}[s]||'st-work';var label={work:'On-location',port:'Port',transit:'Transit',contingency:'Contingency'}[s]||st||'';return'<span class="st-badge '+cls+'">'+label+'</span>';}

var allRows=[];
var assets=[];
var selectedAsset=null;

function processData(rows){
  allRows=rows;
  // Collect unique assets
  var assetSet={};
  rows.forEach(function(r){
    if(r.Asset&&r.Level!=='L1')assetSet[r.Asset]={area:r.Area,region:r.Region};
  });
  assets=Object.keys(assetSet).sort().map(function(k){return{name:k,area:assetSet[k].area,region:assetSet[k].region};});
  renderSelector();
}

function renderSelector(){
  var chips=document.getElementById('assetChips');
  chips.innerHTML='';
  assets.forEach(function(a){
    var chip=document.createElement('button');
    chip.className='asset-chip'+(selectedAsset===a.name?' selected':'');
    chip.textContent=a.name;
    chip.onclick=function(){
      selectedAsset=(selectedAsset===a.name)?null:a.name;
      renderSelector();
      renderContent();
    };
    chips.appendChild(chip);
  });
}

function renderContent(){
  var content=document.getElementById('content');
  if(!selectedAsset){
    content.innerHTML='<div class="no-selection">Select an asset above to view its activity summary.</div>';
    return;
  }

  // Get all activities for this asset (L2 and Standalone)
  var assetRows=allRows.filter(function(r){return r.Asset===selectedAsset&&r.Level!=='L1';});
  if(assetRows.length===0){
    content.innerHTML='<div class="no-selection">No activities found for '+escHtml(selectedAsset)+'.</div>';
    return;
  }

  // Get asset info
  var assetInfo=assets.find(function(a){return a.name===selectedAsset;});
  var fields={};
  assetRows.forEach(function(r){if(r.Field)fields[r.Field]=true;});

  // Get L1 parents for campaigns touching this asset
  var parentNames={};
  assetRows.forEach(function(r){if(r.ParentCampaign)parentNames[r.ParentCampaign]=true;});
  var l1Rows=allRows.filter(function(r){return r.Level==='L1'&&parentNames[r.Title];});

  // Stats
  var totalDays=0,workDays=0,portDays=0,transitDays=0;
  var vesselSet={},groupingSet={},campaignSet={};
  assetRows.forEach(function(r){
    var d=daysBetween(r.CappedStart||r.From,r.CappedEnd||r.To);
    totalDays+=d;
    var st=(r.SubType||'').toLowerCase();
    if(st==='work'||!st)workDays+=d;
    else if(st==='port')portDays+=d;
    else if(st==='transit')transitDays+=d;
    if(r.Vessel)vesselSet[r.Vessel]=true;
    if(r.Grouping)groupingSet[r.Grouping]=true;
    if(r.ParentCampaign)campaignSet[r.ParentCampaign]=true;
  });
  var standaloneCount=assetRows.filter(function(r){return r.Level==='Standalone';}).length;

  var html='';

  // Asset header
  html+='<div class="asset-header">';
  html+='<div class="asset-name">'+escHtml(selectedAsset)+'</div>';
  html+='<div class="asset-sub">'+escHtml(assetInfo.area)+' — '+escHtml(assetInfo.region)+' — Fields: '+Object.keys(fields).sort().join(', ')+'</div>';
  html+='<div class="asset-stats">';
  html+='<div class="as"><div class="as-val">'+Object.keys(campaignSet).length+'</div><div class="as-lbl">Campaigns</div></div>';
  html+='<div class="as"><div class="as-val">'+standaloneCount+'</div><div class="as-lbl">Standalone</div></div>';
  html+='<div class="as"><div class="as-val">'+Object.keys(vesselSet).length+'</div><div class="as-lbl">Vessels</div></div>';
  html+='<div class="as"><div class="as-val">'+totalDays+'d</div><div class="as-lbl">Total days</div></div>';
  html+='<div class="as"><div class="as-val">'+workDays+'d</div><div class="as-lbl">On-location</div></div>';
  if(portDays>0)html+='<div class="as"><div class="as-val">'+portDays+'d</div><div class="as-lbl">Port</div></div>';
  if(transitDays>0)html+='<div class="as"><div class="as-val">'+transitDays+'d</div><div class="as-lbl">Transit</div></div>';
  html+='</div></div>';

  // Timeline Gantt
  html+='<div class="section">';
  html+='<div class="section-hdr">Activity Timeline</div>';
  html+='<div class="gantt-wrap">';
  html+=buildGantt(assetRows,l1Rows);
  html+='</div></div>';

  // Vessel utilisation
  if(Object.keys(vesselSet).length>0){
    html+='<div class="section">';
    html+='<div class="section-hdr">Vessel Utilisation</div>';
    html+=buildVesselUtil(assetRows);
    html+='</div>';
  }

  // Campaign summary table
  if(Object.keys(campaignSet).length>0||standaloneCount>0){
    html+='<div class="section">';
    html+='<div class="section-hdr">Activity Summary</div>';
    html+=buildSummaryTable(assetRows,l1Rows);
    html+='</div>';
  }

  // Grouping breakdown
  html+='<div class="section">';
  html+='<div class="section-hdr">Scope Breakdown</div>';
  html+=buildGroupingBreakdown(assetRows);
  html+='</div>';

  // SIMOPS detection
  html+=buildSimops(assetRows);

  content.innerHTML=html;
}

function buildGantt(rows,l1Rows){
  var allDates=rows.map(function(r){return r.CappedStart||r.From;}).concat(rows.map(function(r){return r.CappedEnd||r.To;}));
  var minDate=new Date(allDates.sort()[0]);
  var maxDate=new Date(allDates.sort().reverse()[0]);
  var tStart=minDate.getTime()-(2*86400000);
  var tEnd=maxDate.getTime()+(2*86400000);
  var tRange=tEnd-tStart;if(tRange<=0)tRange=86400000;
  function pct(d){var t=new Date(d).getTime();return((t-tStart)/tRange)*100;}

  var html='<div class="gantt-timeline">';

  // Months
  html+='<div class="gantt-months">';
  var mDate=new Date(minDate);mDate.setDate(1);
  var monthBounds=[];
  while(mDate.getTime()<=tEnd){
    var mS=mDate.getTime();var mE=new Date(mDate.getFullYear(),mDate.getMonth()+1,1).getTime();
    var mL=Math.max(0,pct(mS));var mR=Math.min(100,pct(mE));
    if(mR>mL)html+='<div class="gantt-mo" style="left:'+mL+'%;width:'+(mR-mL)+'%;">'+MONTHS[mDate.getMonth()]+'</div>';
    if(mDate.getTime()>tStart&&mDate.getTime()<tEnd)monthBounds.push(pct(mDate.getTime()));
    mDate.setMonth(mDate.getMonth()+1);
  }
  html+='</div>';

  // Weeks
  html+='<div class="gantt-wks">';
  var wDate=new Date(minDate);wDate.setDate(1);
  while(wDate.getTime()<=tEnd){
    var wk=1;
    for(var wd=1;wd<=28;wd+=7){
      var wkD=new Date(wDate.getFullYear(),wDate.getMonth(),wd);
      if(wkD.getMonth()!==wDate.getMonth())break;
      var wkE=new Date(wDate.getFullYear(),wDate.getMonth(),Math.min(wd+7,new Date(wDate.getFullYear(),wDate.getMonth()+1,0).getDate()+1));
      if(wkE.getMonth()!==wDate.getMonth())wkE=new Date(wDate.getFullYear(),wDate.getMonth()+1,1);
      if(wkD.getTime()>=tStart-86400000&&wkD.getTime()<=tEnd){
        var wL=Math.max(0,pct(wkD.getTime()));var wR=Math.min(100,pct(wkE.getTime()));
        if(wR>wL)html+='<div class="gantt-wk" style="left:'+wL+'%;width:'+(wR-wL)+'%;">Wk'+wk+'</div>';
      }
      wk++;
    }
    wDate.setMonth(wDate.getMonth()+1);
  }
  html+='</div>';

  // Rows
  html+='<div class="gantt-rows">';
  monthBounds.forEach(function(p){html+='<div class="gantt-gridline" style="left:'+p+'%;"></div>';});

  // Group by campaign/standalone, sorted by start date
  var groups={};
  rows.forEach(function(r){
    var key=r.ParentCampaign||('__s__'+r.Title);
    if(!groups[key])groups[key]={name:r.ParentCampaign||r.Title,isCampaign:!!r.ParentCampaign,rows:[],minFrom:r.CappedStart||r.From};
    groups[key].rows.push(r);
    var f=r.CappedStart||r.From;
    if(f<groups[key].minFrom)groups[key].minFrom=f;
  });
  var sortedGroups=Object.values(groups).sort(function(a,b){return(a.minFrom||'').localeCompare(b.minFrom||'');});

  sortedGroups.forEach(function(g){
    g.rows.sort(function(a,b){return(a.CappedStart||a.From||'').localeCompare(b.CappedStart||b.From||'');});
    g.rows.forEach(function(r,ri){
      var col=getColor(r.Grouping);
      var l=pct(r.CappedStart||r.From);
      var w=pct(r.CappedEnd||r.To)-l;if(w<0.5)w=0.5;
      var dur=daysBetween(r.CappedStart||r.From,r.CappedEnd||r.To);
      var idx=rows.indexOf(r);

      html+='<div class="gantt-row">';
      html+='<div class="gantt-label"><div class="gantt-label-title">'+escHtml(r.Title)+'</div>';
      html+='<div class="gantt-label-sub">';
      if(r.SubType)html+=getStBadge(r.SubType)+' ';
      if(g.isCampaign&&ri===0)html+='<span style="color:var(--accent);font-weight:600;">'+escHtml(g.name)+'</span>';
      else if(r.Vessel)html+=escHtml(r.Vessel);
      html+='</div></div>';
      html+='<div class="gantt-track">';
      html+='<div class="gantt-bar'+getBarClass(r.SubType)+'" style="left:'+l+'%;width:'+w+'%;background:'+col+';" onclick="showPopup(event,'+idx+')">'+escHtml(r.Title)+'</div>';
      html+='</div></div>';
    });
  });

  html+='</div></div>';
  return html;
}

function buildVesselUtil(rows){
  var allDates=rows.map(function(r){return r.CappedStart||r.From;}).concat(rows.map(function(r){return r.CappedEnd||r.To;}));
  var minDate=new Date(allDates.sort()[0]);
  var maxDate=new Date(allDates.sort().reverse()[0]);
  var tStart=minDate.getTime();var tEnd=maxDate.getTime();var tRange=tEnd-tStart;if(tRange<=0)tRange=86400000;
  function pct(d){return((new Date(d).getTime()-tStart)/tRange)*100;}

  var vessels={};
  rows.forEach(function(r){
    if(!r.Vessel)return;
    if(!vessels[r.Vessel])vessels[r.Vessel]=[];
    vessels[r.Vessel].push(r);
  });

  var html='<div style="padding:8px 0;">';
  Object.keys(vessels).sort().forEach(function(v){
    html+='<div class="vessel-row">';
    html+='<div class="vessel-name">'+escHtml(v)+'</div>';
    html+='<div class="vessel-bar-track">';
    vessels[v].forEach(function(r){
      var col=getColor(r.Grouping);
      var l=pct(r.CappedStart||r.From);
      var w=pct(r.CappedEnd||r.To)-l;if(w<0.3)w=0.3;
      html+='<div class="vessel-bar" style="left:'+l+'%;width:'+w+'%;background:'+col+';"></div>';
    });
    html+='</div></div>';
  });
  html+='</div>';
  return html;
}

function buildSummaryTable(rows,l1Rows){
  // Combine campaigns and standalones
  var items=[];
  var campaignMap={};
  rows.forEach(function(r){
    if(r.ParentCampaign){
      if(!campaignMap[r.ParentCampaign])campaignMap[r.ParentCampaign]={activities:0,days:0,workDays:0};
      campaignMap[r.ParentCampaign].activities++;
      var d=daysBetween(r.CappedStart||r.From,r.CappedEnd||r.To);
      campaignMap[r.ParentCampaign].days+=d;
      if(!r.SubType||(r.SubType||'').toLowerCase()==='work')campaignMap[r.ParentCampaign].workDays+=d;
    }
  });

  l1Rows.forEach(function(l1){
    var info=campaignMap[l1.Title]||{activities:0,days:0,workDays:0};
    items.push({type:'Campaign',name:l1.Title,vessel:l1.Vessel,grouping:l1.Grouping,spa:l1.SPA,status:l1.Status,activities:info.activities,days:info.days,workDays:info.workDays,from:l1.From,to:l1.To});
  });

  rows.filter(function(r){return r.Level==='Standalone';}).forEach(function(r){
    var d=daysBetween(r.CappedStart||r.From,r.CappedEnd||r.To);
    items.push({type:'Standalone',name:r.Title,vessel:r.Vessel,grouping:r.Grouping,spa:r.SPA,status:r.Status,activities:1,days:d,workDays:d,from:r.CappedStart||r.From,to:r.CappedEnd||r.To});
  });

  items.sort(function(a,b){return(a.from||'').localeCompare(b.from||'');});

  var html='<table class="camp-table"><thead><tr>';
  html+='<th>Type</th><th>Name</th><th>Vessel</th><th>Grouping</th><th>SPA</th><th>Status</th><th>Activities</th><th>Days</th><th>On-loc</th><th>From</th><th>To</th>';
  html+='</tr></thead><tbody>';
  items.forEach(function(item){
    var col=getColor(item.grouping);
    html+='<tr>';
    html+='<td><span style="font-size:8px;font-weight:700;padding:2px 5px;border-radius:3px;'+(item.type==='Campaign'?'background:var(--accent-light);color:var(--accent);':'background:#f0efeb;color:var(--text-sec);')+'">'+item.type+'</span></td>';
    html+='<td style="font-weight:500;">'+escHtml(item.name)+'</td>';
    html+='<td>'+escHtml(item.vessel)+'</td>';
    html+='<td><span class="grp-dot" style="background:'+col+';"></span>'+escHtml(item.grouping)+'</td>';
    html+='<td>'+escHtml(item.spa)+'</td>';
    html+='<td>'+escHtml((item.status||'').replace('Planned - ',''))+'</td>';
    html+='<td style="font-family:var(--mono);text-align:center;">'+item.activities+'</td>';
    html+='<td style="font-family:var(--mono);text-align:center;">'+item.days+'</td>';
    html+='<td style="font-family:var(--mono);text-align:center;">'+item.workDays+'</td>';
    html+='<td style="font-family:var(--mono);font-size:9px;">'+fmtDate(item.from)+'</td>';
    html+='<td style="font-family:var(--mono);font-size:9px;">'+fmtDate(item.to)+'</td>';
    html+='</tr>';
  });
  html+='</tbody></table>';
  return html;
}

function buildGroupingBreakdown(rows){

  var groups={};
  rows.forEach(function(r){
    var g=r.Grouping||'Other';
    if(!groups[g])groups[g]={days:0,count:0};
    groups[g].days+=daysBetween(r.CappedStart||r.From,r.CappedEnd||r.To);
    groups[g].count++;
  });

  var totalDays=Object.values(groups).reduce(function(s,g){return s+g.days;},0);
  var sorted=Object.keys(groups).sort(function(a,b){return groups[b].days-groups[a].days;});

  var html='<div style="padding:12px 16px;display:flex;gap:20px;flex-wrap:wrap;">';
  sorted.forEach(function(g){
    var col=getColor(g);
    var pct=totalDays>0?Math.round(groups[g].days/totalDays*100):0;
    html+='<div style="min-width:100px;">';
    html+='<div style="display:flex;align-items:center;gap:4px;margin-bottom:4px;"><span class="grp-dot" style="background:'+col+';"></span><span style="font-size:10px;font-weight:600;">'+escHtml(g)+'</span></div>';
    html+='<div style="font-size:16px;font-weight:700;">'+groups[g].days+'d</div>';
    html+='<div style="font-size:8px;color:var(--text-tri);">'+pct+'% — '+groups[g].count+' activities</div>';
    html+='<div style="height:4px;width:80px;background:#f0efeb;border-radius:2px;margin-top:4px;"><div style="height:100%;width:'+pct+'%;background:'+col+';border-radius:2px;"></div></div>';
    html+='</div>';
  });
  html+='</div>';
  return html;
}

function buildSimops(rows){
  // Find overlapping activities at asset level and field level
  var assetClashes=[];
  var fieldClashes=[];

  // Filter to work activities only (port/transit don't create SIMOPS)
  var workRows=rows.filter(function(r){
    var st=(r.SubType||'').toLowerCase();
    return st==='work'||!st;
  });

  // Check each pair
  for(var i=0;i<workRows.length;i++){
    var a=workRows[i];
    var aStart=new Date(a.CappedStart||a.From).getTime();
    var aEnd=new Date(a.CappedEnd||a.To).getTime();
    var aCamp=(a.ParentCampaign||'').trim()||a.Title;

    for(var j=i+1;j<workRows.length;j++){
      var b=workRows[j];
      var bCamp=(b.ParentCampaign||'').trim()||b.Title;

      // Skip activities in the same campaign (multi-vessel campaigns can overlap intentionally)
      if(aCamp.toLowerCase()===bCamp.toLowerCase())continue;
      // Also skip if one activity's campaign name matches the other's parent
      if(a.Title.toLowerCase()===bCamp.toLowerCase()||b.Title.toLowerCase()===aCamp.toLowerCase())continue;

      var bStart=new Date(b.CappedStart||b.From).getTime();
      var bEnd=new Date(b.CappedEnd||b.To).getTime();

      // Check overlap
      if(aStart<bEnd&&bStart<aEnd){
        var overlapStart=Math.max(aStart,bStart);
        var overlapEnd=Math.min(aEnd,bEnd);
        var overlapDays=Math.round((overlapEnd-overlapStart)/86400000);
        if(overlapDays<=0)continue;

        var clash={
          actA:a.Title,campA:aCamp,vesselA:a.Vessel||'',
          actB:b.Title,campB:bCamp,vesselB:b.Vessel||'',
          overlapStart:new Date(overlapStart).toISOString().slice(0,10),
          overlapEnd:new Date(overlapEnd).toISOString().slice(0,10),
          overlapDays:overlapDays,
          fieldA:a.Field||'',fieldB:b.Field||''
        };

        // Asset level = different campaigns overlapping on same asset
        assetClashes.push(clash);

        // Field level = same field too
        if(a.Field&&b.Field&&a.Field===b.Field){
          fieldClashes.push(clash);
        }
      }
    }
  }

  if(assetClashes.length===0){
    return'<div class="section"><div class="section-hdr">SIMOPS Analysis</div><div style="padding:16px;font-size:11px;color:var(--text-tri);">No SIMOPS detected — no overlapping work activities from different campaigns on this asset.</div></div>';
  }

  var html='<div class="section">';
  html+='<div class="section-hdr" style="display:flex;justify-content:space-between;align-items:center;">SIMOPS Analysis';
  html+='<span style="font-size:9px;font-weight:500;padding:2px 8px;border-radius:3px;background:#fef3cd;color:#856404;">'+assetClashes.length+' overlap'+(assetClashes.length>1?'s':'')+'</span></div>';

  // Field-level clashes (higher severity)
  if(fieldClashes.length>0){
    html+='<div style="padding:10px 16px 4px;"><div style="font-size:10px;font-weight:600;color:#c45222;display:flex;align-items:center;gap:4px;">';
    html+='<span style="font-size:14px;">⚠</span> Field-level overlaps ('+fieldClashes.length+')</div>';
    html+='<div style="font-size:8px;color:var(--text-tri);margin-top:2px;">Same field, different campaigns — potential vessel conflict</div></div>';
    html+=renderClashTable(fieldClashes,true);
  }

  // Asset-level clashes
  var assetOnly=assetClashes.filter(function(c){
    return!fieldClashes.some(function(fc){return fc.actA===c.actA&&fc.actB===c.actB;});
  });
  if(assetOnly.length>0){
    html+='<div style="padding:10px 16px 4px;"><div style="font-size:10px;font-weight:600;color:#b8860b;display:flex;align-items:center;gap:4px;">';
    html+='<span style="font-size:14px;">⚡</span> Asset-level overlaps ('+assetOnly.length+')</div>';
    html+='<div style="font-size:8px;color:var(--text-tri);margin-top:2px;">Different fields on same asset — awareness required</div></div>';
    html+=renderClashTable(assetOnly,false);
  }

  html+='</div>';
  return html;
}

function renderClashTable(clashes,showField){
  var html='<div style="padding:4px 16px 12px;overflow-x:auto;">';
  html+='<table class="camp-table"><thead><tr>';
  html+='<th>Activity 1</th><th>Campaign 1</th><th>Vessel 1</th>';
  if(showField)html+='<th>Field</th>';
  html+='<th>Activity 2</th><th>Campaign 2</th><th>Vessel 2</th>';
  html+='<th>Overlap</th><th>Days</th>';
  html+='</tr></thead><tbody>';

  clashes.forEach(function(c){
    var sameVessel=c.vesselA&&c.vesselB&&c.vesselA===c.vesselB;
    html+='<tr'+(sameVessel?' style="background:#fef3cd;"':'')+'>';
    html+='<td style="font-weight:500;">'+escHtml(c.actA)+'</td>';
    html+='<td>'+escHtml(c.campA)+'</td>';
    html+='<td>'+escHtml(c.vesselA)+'</td>';
    if(showField)html+='<td style="font-weight:500;">'+escHtml(c.fieldA)+'</td>';
    html+='<td style="font-weight:500;">'+escHtml(c.actB)+'</td>';
    html+='<td>'+escHtml(c.campB)+'</td>';
    html+='<td>'+escHtml(c.vesselB)+'</td>';
    html+='<td style="font-family:var(--mono);font-size:9px;">'+fmtDate(c.overlapStart)+' — '+fmtDate(c.overlapEnd)+'</td>';
    html+='<td style="font-family:var(--mono);text-align:center;font-weight:600;'+(c.overlapDays>7?'color:#c45222;':'')+'">'+c.overlapDays+'d</td>';
    if(sameVessel)html+='<td style="font-size:8px;color:#c45222;font-weight:600;">⚠ SAME VESSEL</td>';
    html+='</tr>';
  });

  html+='</tbody></table></div>';
  return html;
}

// Popup
var _popupRows=[];

function showPopup(event,idx){
  event.stopPropagation();
  var r=allRows.filter(function(r){return r.Asset===selectedAsset&&r.Level!=='L1';})[idx];
  if(!r)return;
  var dur=daysBetween(r.CappedStart||r.From,r.CappedEnd||r.To);
  var col=getColor(r.Grouping);

  function row(l,v){if(!v)return'';return'<div class="popup-row"><span class="popup-lbl">'+l+'</span><span class="popup-val">'+escHtml(v)+'</span></div>';}

  var html='<div class="popup-title"><span class="grp-dot" style="background:'+col+';"></span>'+escHtml(r.Title)+'</div>';
  html+=row('Campaign',r.ParentCampaign);
  html+=row('SubType',r.SubType);
  html+=row('Vessel',r.Vessel);
  html+=row('Grouping',r.Grouping);
  html+=row('Field',r.Field);
  html+=row('SPA',r.SPA);
  html+=row('Organisation',r.Organisation);
  html+=row('Status',r.Status);
  html+=row('From',fmtDate(r.From));
  html+=row('To',fmtDate(r.To));
  html+=row('Duration',dur+' days');

  document.getElementById('popupContent').innerHTML=html;
  var popup=document.getElementById('popup');
  popup.classList.add('open');
  var pw=popup.offsetWidth,ph=popup.offsetHeight;
  var x=event.clientX+12,y=event.clientY-20;
  if(x+pw>window.innerWidth-10)x=event.clientX-pw-12;
  if(y+ph>window.innerHeight-10)y=window.innerHeight-ph-10;
  if(y<10)y=10;
  popup.style.left=x+'px';popup.style.top=y+'px';
}

function closePopup(){document.getElementById('popup').classList.remove('open');}

document.addEventListener('click',function(e){
  var p=document.getElementById('popup');
  if(p.classList.contains('open')&&!p.contains(e.target)&&!e.target.closest('.gantt-bar'))closePopup();
});

function toggleHelp(){
  var o=document.getElementById('helpOverlay');
  if(!o){
    o=document.createElement('div');o.id='helpOverlay';
    o.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.3);z-index:300;display:flex;align-items:center;justify-content:center;';
    o.onclick=function(e){if(e.target===o){o.remove();}};
    o.innerHTML='<div style="background:#fff;border-radius:10px;box-shadow:0 12px 40px rgba(0,0,0,0.15);width:460px;max-height:80vh;overflow-y:auto;padding:24px;"><div style="font-size:18px;font-weight:600;margin-bottom:12px;">Asset Summary — Guide</div><div style="font-size:11px;color:var(--text-sec);line-height:1.6;"><p style="margin-bottom:8px;"><b>Asset selector</b> — click an asset chip to view its summary. Click again to deselect.</p><p style="margin-bottom:8px;"><b>Stats</b> — campaigns, standalone activities, vessels, total days, on-location days.</p><p style="margin-bottom:8px;"><b>Activity timeline</b> — Gantt chart showing all activities on the asset, grouped by campaign. Click any bar for details.</p><p style="margin-bottom:8px;"><b>Vessel utilisation</b> — shows when each vessel is active on the asset.</p><p style="margin-bottom:8px;"><b>Activity summary</b> — table of all campaigns and standalone activities with key details.</p><p><b>Scope breakdown</b> — days and percentage by grouping type (IRM, DSV, etc).</p></div><button onclick="this.closest(\'div[id=helpOverlay]\').remove()" style="margin-top:12px;font-family:var(--font);font-size:11px;padding:6px 14px;border-radius:5px;border:1px solid var(--border);background:var(--surface);cursor:pointer;">Close</button></div>';
    document.body.appendChild(o);
  }else{o.remove();}
}

document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){closePopup();var h=document.getElementById('helpOverlay');if(h)h.remove();}
});

window.addEventListener('message',function(event){
  try{
    var payload=event.data;
    if(typeof payload==='string')payload=JSON.parse(payload);
    if(payload.allRows){processData(payload.allRows);if(payload.context)document.getElementById('toolbarContext').textContent=payload.context;}
    else if(Array.isArray(payload)){processData(payload);}
  }catch(e){console.error('Parse error:',e);}
});

if(typeof window.TEST_DATA!=='undefined'){processData(window.TEST_DATA.allRows||window.TEST_DATA);}
